<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>movieNite</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="search-row">
    <input
        id="searchBox"
        type="text"
        value = "Na samotě u lesa"
        placeholder="Type movie name..."
        autocomplete="off"
    >
    <div id="services"></div>
</div>
<p>1000</p>
<div class="movies-section">

    <!-- Row 1: Headline -->
    <h2>1000 Movies</h2>

    <!-- Row 2: Region filter -->
    <div class="filter-row" id="regionFilters">Region</div>

    <!-- Row 3: Genre Group filter -->
    <div class="filter-row" id="genreFilters">Genre</div>

    <!-- Row 4: Year Group filter -->
    <div class="filter-row" id="yearFilters">Year</div>

    <!-- Row 5+: Filtered movie list -->
    <div id="movieList">Movies will be displayed here</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
